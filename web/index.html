    <!-- FAQPage — drives rich results (accordion) in Google SERP -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Will assisted stretching hurt?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Pressure is always within your comfort. We work to a good stretch feeling — if it ever tips into pain, we back off immediately." }
        },
        {
          "@type": "Question",
          "name": "Do I need to be flexible to benefit from assisted stretching?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. The less flexible you are, the more dramatic the gain. Tightness is the reason to come, not the reason to wait." }
        },
        {
          "@type": "Question",
          "name": "What do I wear to an assisted stretch session?",
          "acceptedAnswer": { "@type": "Answer", "text": "Gym shorts and a t-shirt, or anything you can move freely in. Think of what you would wear to a yoga class or the gym. No need to undress." }
        },
        {
          "@type": "Question",
          "name": "How often should I get assisted stretching?",
          "acceptedAnswer": { "@type": "Answer", "text": "Most clients see best results once a week or fortnight. Athletes in heavy training blocks often come twice a week. Even a single session produces measurable improvement." }
        },
        {
          "@type": "Question",
          "name": "Is assisted stretching covered by health funds in Australia?",
          "acceptedAnswer": { "@type": "Answer", "text": "Many Australian extras policies cover remedial elements of the session through HICAPS on-site. Check with your fund before booking to confirm your eligibility." }
        },
        {
          "@type": "Question",
          "name": "What is PNF stretching?",
          "acceptedAnswer": { "@type": "Answer", "text": "PNF (proprioceptive neuromuscular facilitation) uses contract-relax cycles to access ranges of motion your body normally protects. By briefly contracting a muscle before releasing it into a stretch, the practitioner can safely take you past the limits your nervous system normally imposes. The result is deeper, faster, and longer-lasting change than passive stretching alone." }
        },
        {
          "@type": "Question",
          "name": "How is assisted stretching different from yoga or massage?",
          "acceptedAnswer": { "@type": "Answer", "text": "Massage therapists work tissue with pressure. Yoga instructors teach you to move your own body. Assisted stretching is different — a trained practitioner moves your body through targeted PNF and passive stretches that are impossible to achieve alone. Your muscles fully release because you are not controlling the movement. The precision also differs: sessions target your specific imbalances in real time." }
        },
        {
          "@type": "Question",
          "name": "Can assisted stretching help with back pain and desk-related stiffness?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Hip flexors, hamstrings, chest muscles, and spinal muscles that tighten from prolonged sitting are the primary targets. Most clients notice a meaningful reduction in daily stiffness and pain with regular sessions." }
        },
        {
          "@type": "Question",
          "name": "Is there a money-back guarantee?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. If you do not feel a measurable difference after your first session, we will refund you in full." }
        },
        {
          "@type": "Question",
          "name": "How long is an assisted stretch session?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sessions are 60 minutes. This includes a brief range-of-movement assessment at the start, 45 minutes of hands-on stretching, and a retest at the end so you can feel the difference." }
        },
        {
          "@type": "Question",
          "name": "Is assisted stretching safe if I have an injury?",
          "acceptedAnswer": { "@type": "Answer", "text": "Assisted stretching can be safely adapted around most injuries and conditions. You will complete a health waiver before your first session. Always disclose current injuries, surgeries, or medical conditions so the session can be tailored appropriately." }
        },
        {
          "@type": "Question",
          "name": "Where is Assisted Stretches located?",
          "acceptedAnswer": { "@type": "Answer", "text": "Assisted Stretches is located at 41 Barton Parade, Balmoral, Brisbane QLD 4171, Australia. Street parking is available on Barton Parade." }
        }
      ]
    }
    </script>
